name: lzmalloc Fast CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  fast-build-test:
    name: Ubuntu LTS (Bare-metal Validation)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Install dependencies (Clang/CMake)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake lld llvm binutils

      - name: Run Core Test Suite
        run: make test CC=clang

      - name: Build Production Release
        run: make release CC=clang