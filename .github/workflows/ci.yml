name: lzmalloc Fast CI

# Trigger on every push or pull request to the main branches
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  fast-build-test:
    name: Ubuntu LTS (Bare-metal)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: 🛠️ Install dependencies (Clang/CMake)
        # ubuntu-latest already includes most of this, but we ensure the latest versions
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake

      - name: ⚙️ Configure lzmalloc (CMake)
        # Generate dynamic constants for x86_64 forcing the Clang compiler
        run: cmake -B build/release -DCMAKE_C_COMPILER=clang -DCMAKE_BUILD_TYPE=Release

      - name: 🔨 Build library
        # Compile using all available CPU cores on the GitHub runner
        run: make -C build/release -j$(nproc)

      - name: 🧪 POSIX Smoke Test (LD_PRELOAD)
        # Inject the newly compiled allocator to run a quick file system traversal
        run: |
          echo "=== Executing POSIX injection on Ubuntu ==="
          LD_PRELOAD=$PWD/build/release/liblzmalloc.so ls -laR /usr/lib > /dev/null
          echo "=== Injection successful without crashes ==="